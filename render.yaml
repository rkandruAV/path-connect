services:
  - type: web
    name: path-connect-api
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DEV_BYPASS_AUTH
        value: "false"
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
